<body class="bg-surface-container-lowest text-on-surface font-body-md min-h-screen relative overflow-hidden select-none">

<div class="fixed inset-0 bg-gradient-to-tr from-surface-container-lowest via-transparent to-primary-container/5 pointer-events-none"></div>
<!-- Top Navigation -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#0B0E14]/80 backdrop-blur-xl border-b border-[#ffffff10] shadow-[0_0_15px_rgba(0,0,0,0.5)]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">security</span>
<span class="font-headline-md text-primary-container drop-shadow-[0_0_8px_rgba(0,240,255,0.5)] tracking-wider uppercase">AI 驅鳥回報</span>
</div>
<button class="w-10 h-10 border border-primary-container/50 flex items-center justify-center text-primary-container transition-all duration-300 ease-in-out active:scale-95 hover:bg-primary-container/10 hover:shadow-[0_0_10px_rgba(0,240,255,0.3)]">
<span class="material-symbols-outlined">home</span>
</button>
</header>
<!-- Main Content Area -->
<main class="relative z-10 w-full h-screen flex items-center justify-center pt-16">
<!-- Background Hero Element -->

</div>
<!-- Authentication Panel -->
<div class="glass-panel w-full max-w-md p-8 relative overflow-hidden group" id="auth-panel">
<!-- Decorative Accent Lines -->
<div class="absolute top-0 left-0 w-16 h-1 bg-primary-container shadow-[0_0_10px_rgba(0,240,255,0.8)]"></div>
<div class="absolute bottom-0 right-0 w-16 h-1 bg-primary-container"></div>
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full border border-primary-container/20 bg-primary-container/5 mb-4">
<span class="material-symbols-outlined text-primary-container text-4xl" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
</div>
<h1 class="font-headline-md text-on-surface tracking-widest uppercase mb-1">身分驗證面板</h1>
<p class="text-on-surface-variant font-label-caps opacity-60">Terminal Access Restricted Area</p>
</div>
<div class="space-y-6">
<!-- Operator ID Input -->
<div class="space-y-2">
<label class="block font-label-caps text-primary-container/80 ml-1">技術員編號 / OPERATOR ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary-container/40 text-lg">badge</span>
<input id="input-id" class="w-full bg-surface-container-high border-b border-outline-variant focus:border-secondary-container text-on-surface font-mono py-3 pl-10 pr-4 transition-all duration-300 outline-none placeholder:text-outline/30" placeholder="THX-1138-00" type="text"/>
</div>
</div>
<!-- Access Key Input -->
<div class="space-y-2">
<label class="block font-label-caps text-primary-container/80 ml-1">存取密鑰 / ACCESS KEY</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary-container/40 text-lg">key</span>
<input id="input-pw" class="w-full bg-surface-container-high border-b border-outline-variant focus:border-secondary-container text-on-surface font-mono py-3 pl-10 pr-4 transition-all duration-300 outline-none placeholder:text-outline/30" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Status / Error Message -->
<div id="status-bar" class="flex items-center gap-3 py-2 px-3 border border-[#ffffff05] bg-surface-container-low/50">
<div id="status-dot" class="w-2 h-2 bg-secondary-container rounded-full animate-pulse shadow-[0_0_8px_#2ae500]"></div>
<span id="status-text" class="text-[10px] font-label-caps text-on-surface-variant">加密連線已建立：AES-256 ENCRYPTION ACTIVE</span>

<span class="relative z-10" id="btn-text">啟動程序</span>
<span class="material-symbols-outlined relative z-10 transition-transform duration-300 group-hover/btn:translate-x-2" id="btn-icon">terminal</span>
<div class="absolute inset-0 bg-white/10 -translate-y-full group-hover/btn:translate-y-full transition-transform duration-700 ease-in-out"></div>
</button>

        </div>

<div class="w-1 h-3 bg-secondary-container"></div>
<div class="w-1 h-3 bg-secondary-container"></div>

</div>

<div class="w-1 h-3 bg-primary-container"></div>
<div class="w-1 h-3 bg-primary-container"></div>

<!-- UI Decor -->
<div class="fixed top-0 left-0 w-32 h-32 border-l border-t border-primary-container/20 pointer-events-none mt-20 ml-10"></div>
<div class="fixed bottom-0 right-0 w-32 h-32 border-r border-b border-primary-container/20 pointer-events-none mb-10 mr-10"></div>

<script>
  const VALID_ID = 'abc123';
  const VALID_PW = 'ABC123';

  function handleLogin() {
    const id = document.getElementById('input-id').value.trim();
    const pw = document.getElementById('input-pw').value;
    const btn = document.getElementById('login-btn');
    const btnText = document.getElementById('btn-text');
    const btnIcon = document.getElementById('btn-icon');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const panel = document.getElementById('auth-panel');

    if (id === VALID_ID && pw === VALID_PW) {
      // 成功
      btnText.textContent = '驗證成功';
      btnIcon.textContent = 'check_circle';
      btn.classList.remove('bg-primary-container');
      btn.classList.add('bg-secondary-container');
      statusDot.classList.remove('bg-secondary-container', 'shadow-[0_0_8px_#2ae500]');
      statusDot.classList.add('bg-secondary-container');
      statusText.textContent = '身分驗證完成，正在載入系統...';
      statusText.style.color = '#2ff801';

      setTimeout(() => {
        window.location.href = 'code2.html';
      }, 1000);

    } else {
      // 失敗
      panel.classList.add('error-shake');
      statusDot.classList.remove('bg-secondary-container', 'shadow-[0_0_8px_#2ae500]');
      statusDot.classList.add('bg-error', 'shadow-[0_0_8px_#ff0000]');
      statusText.textContent = '存取拒絕：帳號或密鑰錯誤';
      statusText.style.color = '#ffb4ab';

      setTimeout(() => {
        panel.classList.remove('error-shake');
        statusDot.classList.remove('bg-error', 'shadow-[0_0_8px_#ff0000]');
        statusDot.classList.add('bg-secondary-container', 'shadow-[0_0_8px_#2ae500]');
        statusText.textContent = '加密連線已建立：AES-256 ENCRYPTION ACTIVE';
        statusText.style.color = '';
      }, 2000);
    }
  }

  // Enter 鍵也可以登入
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body></html>
